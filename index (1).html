<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sagar AI</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #7c6bff;
    --accent2: #ff6b9d;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --success: #4ade80;
    --error: #ff6b6b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* AUTH SCREEN */
  #auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 20% 50%, #1a1040 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, #0d1f3c 0%, transparent 60%),
                var(--bg);
  }
  .auth-box {
    width: 100%;
    max-width: 420px;
    padding: 2.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: 0 0 80px rgba(124, 107, 255, 0.1);
  }
  .auth-logo {
    text-align: center;
    margin-bottom: 2rem;
  }
  .auth-logo h1 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -1px;
  }
  .auth-logo p { color: var(--muted); font-size: 0.85rem; margin-top: 0.3rem; }
  .tab-btns {
    display: flex;
    background: var(--surface2);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 1.5rem;
  }
  .tab-btn {
    flex: 1;
    padding: 0.6rem;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 8px;
    font-family: 'Sora', sans-serif;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: var(--accent);
    color: white;
  }
  .form-group { margin-bottom: 1rem; }
  .form-group label {
    display: block;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.4rem;
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .form-group input {
    width: 100%;
    padding: 0.75rem 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--accent); }
  .btn-primary {
    width: 100%;
    padding: 0.85rem;
    background: linear-gradient(135deg, var(--accent), #5a4fd8);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Sora', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 0.5rem;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .auth-msg {
    text-align: center;
    margin-top: 1rem;
    font-size: 0.85rem;
    min-height: 20px;
  }
  .auth-msg.error { color: var(--error); }
  .auth-msg.success { color: var(--success); }

  /* MAIN APP */
  #app-screen { display: none; height: 100vh; flex-direction: column; }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1.5rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
  .topbar-logo {
    font-size: 1.1rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .topbar-right { display: flex; align-items: center; gap: 0.75rem; }
  .user-badge {
    font-size: 0.8rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }
  .btn-sm {
    padding: 0.4rem 0.9rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-sm:hover { background: var(--surface2); }
  .btn-sm.danger { border-color: var(--error); color: var(--error); }
  .btn-sm.accent { border-color: var(--accent); color: var(--accent); }

  /* CHAT AREA */
  .chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
    padding: 0 1rem;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 0;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 0.75rem;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    flex-shrink: 0;
  }
  .msg.ai .msg-avatar { background: linear-gradient(135deg, var(--accent), #5a4fd8); }
  .msg.user .msg-avatar { background: linear-gradient(135deg, var(--accent2), #c94d7a); }
  .msg-content {
    max-width: 75%;
    padding: 0.85rem 1.1rem;
    border-radius: 14px;
    font-size: 0.92rem;
    line-height: 1.6;
  }
  .msg.ai .msg-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }
  .msg.user .msg-content {
    background: linear-gradient(135deg, var(--accent), #5a4fd8);
    color: white;
    border-top-right-radius: 4px;
  }
  .msg-time {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.25rem;
    font-family: 'Space Mono', monospace;
  }
  .msg.user .msg-time { text-align: right; }

  /* TYPING INDICATOR */
  .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 0.85rem 1.1rem; }
  .typing-dot {
    width: 7px; height: 7px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* INPUT AREA */
  .input-area {
    padding: 1rem 0 1.5rem;
    flex-shrink: 0;
  }
  .input-box {
    display: flex;
    gap: 0.75rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.75rem 1rem;
    transition: border-color 0.2s;
  }
  .input-box:focus-within { border-color: var(--accent); }
  .input-box textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 0.95rem;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
  }
  .input-box textarea::placeholder { color: var(--muted); }
  .send-btn {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #5a4fd8);
    border: none;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    align-self: flex-end;
    transition: opacity 0.2s;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* WELCOME */
  .welcome {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
  }
  .welcome h2 {
    font-size: 1.5rem;
    color: var(--text);
    margin-bottom: 0.5rem;
    font-weight: 600;
  }
  .welcome p { font-size: 0.9rem; }

  /* ADMIN PANEL */
  #admin-screen {
    display: none;
    height: 100vh;
    flex-direction: column;
  }
  .admin-content {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    max-width: 1000px;
    width: 100%;
    margin: 0 auto;
  }
  .admin-title {
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.2rem;
  }
  .stat-label { font-size: 0.75rem; color: var(--muted); font-family: 'Space Mono', monospace; text-transform: uppercase; }
  .stat-value { font-size: 2rem; font-weight: 700; margin-top: 0.25rem; color: var(--accent); }
  .section-title {
    font-size: 0.85rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.75rem;
  }
  .user-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 2rem; }
  .user-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.85rem 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .user-email { font-size: 0.9rem; }
  .user-meta { font-size: 0.75rem; color: var(--muted); font-family: 'Space Mono', monospace; }
  .chat-log { display: flex; flex-direction: column; gap: 0.5rem; }
  .chat-log-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.85rem 1rem;
  }
  .chat-log-user { font-size: 0.75rem; color: var(--accent); font-family: 'Space Mono', monospace; margin-bottom: 0.3rem; }
  .chat-log-msg { font-size: 0.88rem; color: var(--text); }
  .chat-log-time { font-size: 0.7rem; color: var(--muted); margin-top: 0.2rem; font-family: 'Space Mono', monospace; }
  .empty-state { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.9rem; }

  /* CONFIG MODAL */
  #config-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #config-modal.open { display: flex; }
  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 0 60px rgba(0,0,0,0.5);
  }
  .modal-box h2 { font-size: 1.2rem; margin-bottom: 0.5rem; }
  .modal-box p { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem; }
  .modal-actions { display: flex; gap: 0.75rem; margin-top: 1rem; }
  .btn-cancel {
    flex: 1;
    padding: 0.75rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    cursor: pointer;
    font-family: 'Sora', sans-serif;
  }
  .btn-save {
    flex: 1;
    padding: 0.75rem;
    background: linear-gradient(135deg, var(--accent), #5a4fd8);
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    font-family: 'Sora', sans-serif;
    font-weight: 600;
  }

  .hidden { display: none !important; }
  .flex { display: flex !important; }
</style>
</head>
<body>

<!-- CONFIG MODAL -->
<div id="config-modal">
  <div class="modal-box">
    <h2>⚙️ Setup Keys</h2>
    <p>Apni API keys enter karo. Yeh sirf aapke browser mein save hoti hain.</p>
    <div class="form-group">
      <label>Supabase URL</label>
      <input type="text" id="cfg-supabase-url" placeholder="https://xxx.supabase.co">
    </div>
    <div class="form-group">
      <label>Supabase Publishable Key</label>
      <input type="text" id="cfg-supabase-key" placeholder="sb_publishable_...">
    </div>
    <div class="form-group">
      <label>Claude API Key</label>
      <input type="password" id="cfg-claude-key" placeholder="sk-ant-...">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeConfig()">Cancel</button>
      <button class="btn-save" onclick="saveConfig()">Save & Continue</button>
    </div>
  </div>
</div>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>✦ Sagar AI</h1>
      <p>Your intelligent conversation partner</p>
    </div>
    <div class="tab-btns">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="aapka@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="login()">Login →</button>
    </div>
    <div id="signup-form" class="hidden">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="aapka@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Min 6 characters">
      </div>
      <button class="btn-primary" onclick="signup()">Create Account →</button>
    </div>
    <div id="auth-msg" class="auth-msg"></div>
    <div style="text-align:center; margin-top:1rem;">
      <button class="btn-sm" onclick="openConfig()">⚙️ Setup API Keys</button>
    </div>
  </div>
</div>

<!-- MAIN CHAT SCREEN -->
<div id="app-screen" style="display:none; flex-direction:column; height:100vh;">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">✦ Sagar AI</span>
    </div>
    <div class="topbar-right">
      <span class="user-badge" id="user-email-display"></span>
      <button class="btn-sm accent" id="admin-btn" onclick="showAdmin()" style="display:none;">Admin</button>
      <button class="btn-sm" onclick="openConfig()">⚙️</button>
      <button class="btn-sm danger" onclick="logout()">Logout</button>
    </div>
  </div>
  <div class="chat-container">
    <div class="messages" id="messages">
      <div class="welcome">
        <h2>Namaste! 👋</h2>
        <p>Main Sagar AI hoon. Kuch bhi poochho!</p>
      </div>
    </div>
    <div class="input-area">
      <div class="input-box">
        <textarea id="msg-input" placeholder="Kuch poochho..." rows="1"
          onkeydown="handleKey(event)"
          oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ADMIN SCREEN -->
<div id="admin-screen" style="display:none; flex-direction:column; height:100vh;">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">✦ Sagar AI — Admin</span>
    </div>
    <div class="topbar-right">
      <button class="btn-sm accent" onclick="showChat()">← Back to Chat</button>
      <button class="btn-sm danger" onclick="logout()">Logout</button>
    </div>
  </div>
  <div class="admin-content">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Users</div>
        <div class="stat-value" id="stat-users">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Messages</div>
        <div class="stat-value" id="stat-msgs">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Today's Chats</div>
        <div class="stat-value" id="stat-today">—</div>
      </div>
    </div>
    <div class="section-title">Recent Users</div>
    <div class="user-list" id="admin-users"></div>
    <div class="section-title">Recent Chat History</div>
    <div class="chat-log" id="admin-chats"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============ CONFIG ============
let SUPABASE_URL = localStorage.getItem('sb_url') || '';
let SUPABASE_KEY = localStorage.getItem('sb_key') || '';
let CLAUDE_KEY = localStorage.getItem('claude_key') || '';
const ADMIN_EMAIL = 'admin@aichat.com'; // Change this to your email

let supabase = null;
let currentUser = null;
let chatHistory = [];

function initSupabase() {
  if (SUPABASE_URL && SUPABASE_KEY) {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    return true;
  }
  return false;
}

function openConfig() {
  document.getElementById('cfg-supabase-url').value = SUPABASE_URL;
  document.getElementById('cfg-supabase-key').value = SUPABASE_KEY;
  document.getElementById('cfg-claude-key').value = CLAUDE_KEY;
  document.getElementById('config-modal').classList.add('open');
}

function closeConfig() {
  document.getElementById('config-modal').classList.remove('open');
}

function saveConfig() {
  SUPABASE_URL = document.getElementById('cfg-supabase-url').value.trim();
  SUPABASE_KEY = document.getElementById('cfg-supabase-key').value.trim();
  CLAUDE_KEY = document.getElementById('cfg-claude-key').value.trim();
  localStorage.setItem('sb_url', SUPABASE_URL);
  localStorage.setItem('sb_key', SUPABASE_KEY);
  localStorage.setItem('claude_key', CLAUDE_KEY);
  initSupabase();
  closeConfig();
  showMsg('Keys saved!', 'success');
}

// ============ AUTH ============
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='signup')));
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('signup-form').classList.toggle('hidden', tab !== 'signup');
}

function showMsg(msg, type='error') {
  const el = document.getElementById('auth-msg');
  el.textContent = msg;
  el.className = 'auth-msg ' + type;
  if(type==='success') setTimeout(() => el.textContent='', 3000);
}

async function signup() {
  if (!initSupabase()) return showMsg('Pehle API keys setup karo ⚙️');
  const email = document.getElementById('signup-email').value.trim();
  const pass = document.getElementById('signup-password').value;
  if (!email || !pass) return showMsg('Email aur password dono bharo');
  showMsg('Creating account...', 'success');
  const { error } = await supabase.auth.signUp({ email, password: pass });
  if (error) return showMsg(error.message);
  showMsg('Account bana! Ab login karo.', 'success');
  switchTab('login');
}

async function login() {
  if (!initSupabase()) return showMsg('Pehle API keys setup karo ⚙️');
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-password').value;
  if (!email || !pass) return showMsg('Email aur password dono bharo');
  showMsg('Logging in...', 'success');
  const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
  if (error) return showMsg(error.message);
  currentUser = data.user;
  enterApp();
}

async function logout() {
  await supabase.auth.signOut();
  currentUser = null;
  chatHistory = [];
  document.getElementById('messages').innerHTML = `<div class="welcome"><h2>Namaste! 👋</h2><p>Main Sagar AI hoon. Kuch bhi poochho!</p></div>`;
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'none';
}

function enterApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'flex';
  document.getElementById('user-email-display').textContent = currentUser.email;
  if (currentUser.email === ADMIN_EMAIL) {
    document.getElementById('admin-btn').style.display = 'inline-block';
  }
  loadHistory();
  setupTables();
}

// ============ SUPABASE TABLES ============
async function setupTables() {
  // Tables will be created via SQL in Supabase dashboard
  // Just check if we can connect
}

async function saveMessage(role, content) {
  if (!supabase || !currentUser) return;
  try {
    await supabase.from('messages').insert({
      user_id: currentUser.id,
      user_email: currentUser.email,
      role,
      content,
      created_at: new Date().toISOString()
    });
  } catch(e) { console.log('Save error:', e); }
}

async function loadHistory() {
  if (!supabase || !currentUser) return;
  try {
    const { data } = await supabase
      .from('messages')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('created_at', { ascending: true })
      .limit(20);
    if (data && data.length > 0) {
      const container = document.getElementById('messages');
      container.innerHTML = '';
      data.forEach(msg => {
        chatHistory.push({ role: msg.role, content: msg.content });
        appendMessage(msg.role, msg.content, new Date(msg.created_at).toLocaleTimeString('en', {hour:'2-digit',minute:'2-digit'}));
      });
    }
  } catch(e) { console.log('Load error:', e); }
}

// ============ CHAT ============
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function appendMessage(role, content, time) {
  const container = document.getElementById('messages');
  const welcome = container.querySelector('.welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
  const avatar = role === 'user' ? '👤' : '✦';
  const t = time || new Date().toLocaleTimeString('en', {hour:'2-digit',minute:'2-digit'});
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div>
      <div class="msg-content">${content.replace(/\n/g,'<br>')}</div>
      <div class="msg-time">${t}</div>
    </div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function showTyping() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing-msg';
  div.innerHTML = `<div class="msg-avatar">✦</div><div class="msg-content"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-msg');
  if (t) t.remove();
}

async function sendMessage() {
  if (!CLAUDE_KEY) return alert('Claude API key setup karo ⚙️');
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  appendMessage('user', text);
  chatHistory.push({ role: 'user', content: text });
  saveMessage('user', text);

  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': CLAUDE_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'Tumhara naam Sagar AI hai. Tumhe Sagar Kumar ne banaya hai. Agar koi pooche "kisne banaya", "who made you", "tumhara creator kaun hai", "aapko kisne develop kiya" ya koi bhi aisi cheez — toh hamesha yahi jawab do: "Mujhe Sagar Kumar ne banaya hai." Tum ek helpful AI assistant ho. Hindi aur English dono mein jawab de sakte ho jaise user baat kare.',
        messages: chatHistory.slice(-10)
      })
    });
    const data = await res.json();
    removeTyping();
    if (data.content && data.content[0]) {
      const reply = data.content[0].text;
      appendMessage('assistant', reply);
      chatHistory.push({ role: 'assistant', content: reply });
      saveMessage('assistant', reply);
    } else {
      appendMessage('assistant', 'Kuch error aaya. Dobara try karo.');
    }
  } catch(e) {
    removeTyping();
    appendMessage('assistant', 'Network error. API key check karo.');
  }
  document.getElementById('send-btn').disabled = false;
}

// ============ ADMIN ============
async function showAdmin() {
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'flex';
  loadAdminData();
}

function showChat() {
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'flex';
}

async function loadAdminData() {
  if (!supabase) return;
  try {
    // Get all messages
    const { data: msgs } = await supabase.from('messages').select('*').order('created_at', { ascending: false }).limit(50);
    if (msgs) {
      document.getElementById('stat-msgs').textContent = msgs.length;
      // Unique users
      const users = [...new Set(msgs.map(m => m.user_email))];
      document.getElementById('stat-users').textContent = users.length;
      // Today
      const today = new Date().toDateString();
      const todayMsgs = msgs.filter(m => new Date(m.created_at).toDateString() === today);
      document.getElementById('stat-today').textContent = todayMsgs.length;

      // User list
      const userListEl = document.getElementById('admin-users');
      userListEl.innerHTML = users.length ? users.map(u => {
        const userMsgs = msgs.filter(m => m.user_email === u);
        return `<div class="user-item"><span class="user-email">${u}</span><span class="user-meta">${userMsgs.length} messages</span></div>`;
      }).join('') : '<div class="empty-state">Koi users nahi abhi</div>';

      // Chat log
      const chatLogEl = document.getElementById('admin-chats');
      const userMsgs = msgs.filter(m => m.role === 'user').slice(0, 20);
      chatLogEl.innerHTML = userMsgs.length ? userMsgs.map(m => `
        <div class="chat-log-item">
          <div class="chat-log-user">${m.user_email}</div>
          <div class="chat-log-msg">${m.content}</div>
          <div class="chat-log-time">${new Date(m.created_at).toLocaleString()}</div>
        </div>`).join('') : '<div class="empty-state">Koi chats nahi abhi</div>';
    }
  } catch(e) { console.log('Admin error:', e); }
}

// ============ INIT ============
initSupabase();
if (!SUPABASE_URL || !SUPABASE_KEY || !CLAUDE_KEY) {
  setTimeout(openConfig, 500);
}

// Check existing session
window.addEventListener('load', async () => {
  if (initSupabase()) {
    const { data } = await supabase.auth.getSession();
    if (data.session) {
      currentUser = data.session.user;
      enterApp();
    }
  }
});
</script>
